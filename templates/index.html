<!DOCTYPE html>
<html>
<head>
    <title>AI Expense Tracker</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        .register {
            background: #28a745;
        }

        .login {
            background: #007bff;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 AI Expense Tracker</h1>
        <p>Manage your daily expenses smartly using AI</p>

        <a href="/register" class="btn register">Register</a>
        <a href="/login" class="btn login">Login</a>

        <footer>Mini Project by Soul 💙</footer>
    </div>
</body>
</html>
