{% extends 'base_sidebar.html' %}
{% block title %}Edit Expense – AI Expense Tracker{% endblock %}

{% block content %}
<div class="page-header">
  <h1>✏️ Edit Expense</h1>
  <p>Update the details of this expense</p>
</div>

<div style="max-width:520px;">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Expense Details</div>
      <div class="card-badge">Editing</div>
    </div>

    <form action="/edit-expense/{{ expense._id }}" method="POST">

      <div class="form-group">
        <label>💰 Amount (₹)</label>
        <input type="number" name="amount" value="{{ expense.amount }}" min="1" required/>
      </div>

      <div class="form-group">
        <label>🏷️ Category</label>
        <select name="category">
          {% for cat in ['Food','Travel','Shopping','Bills','Entertainment','Other'] %}
          <option {% if expense.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>📅 Date</label>
        <input type="date" name="date" value="{{ expense.date }}" required/>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button class="btn btn-primary" type="submit" style="flex:1;">💾 Save Changes</button>
        <a href="/view-expenses" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>

  <div style="margin-top:16px;">
    <a href="/delete-expense/{{ expense._id }}" class="btn btn-danger"
       onclick="return confirm('Permanently delete this expense?')"
       style="width:100%;justify-content:center;">🗑️ Delete This Expense</a>
  </div>
</div>
{% endblock %}
