<!DOCTYPE html>
<html>
<head>
    <title>Login Failed</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #dc3545;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        a {
            text-decoration: none;
            background: #dc3545;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        a:hover {
            background: #a71d2a;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>❌ Login Failed</h2>
        <p>Invalid Username or Password. Please try again.</p>
        <a href="/login">Back to Login</a>
    </div>
</body>
</html>
