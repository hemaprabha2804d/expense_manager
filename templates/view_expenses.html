<!DOCTYPE html>
<html>
<head>

<title>View Expenses</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(to right,#36d1dc,#5b86e5);
    text-align:center;
}

h1{
    margin-top:40px;
    color:white;
}

table{
    margin:40px auto;
    border-collapse:collapse;
    width:70%;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

th{
    background:#333;
    color:white;
}

tr:hover{
    background:#f2f2f2;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#333;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>

</head>

<body>

<h1>📊 Your Expenses</h1>

<table>

<tr>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
</tr>

{% for exp in expenses %}

<tr>
<td>{{ exp.category }}</td>
<td>₹ {{ exp.amount }}</td>
<td>{{ exp.date }}</td>
</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn">Back to Dashboard</a>

</body>

</html>
