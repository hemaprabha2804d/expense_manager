<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AI Expense Tracker{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --accent: #6c63ff; --accent2: #fc5c7d;
      --green: #43e97b; --text: #e2e8f0; --muted: #8892a4;
      --border: rgba(255,255,255,0.07); --radius: 14px;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
    }
    .auth-wrap { width: 420px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-icon { width: 56px; height: 56px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 12px; }
    .auth-logo h1 { font-size: 22px; font-weight: 700; }
    .auth-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px; font-family: 'Inter',sans-serif; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 18px; }
    .btn-block { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter',sans-serif; transition: all .2s; text-align: center; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg,var(--accent),#8b84ff); color: white; }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-success { background: linear-gradient(135deg,#43e97b,#38f9d7); color: #0f1117; }
    .btn-success:hover { opacity: .88; transform: translateY(-1px); }
    .auth-footer { margin-top: 18px; text-align: center; font-size: 13px; color: var(--muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* Feedback pages */
    .feedback-icon { font-size: 52px; text-align: center; display: block; margin-bottom: 14px; }
    .feedback-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .feedback-msg { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .color-success { color: var(--green); }
    .color-danger  { color: var(--accent2); }

    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h1>AI Expense Tracker</h1>
      <p>{% block subtitle %}Manage your finances smartly{% endblock %}</p>
    </div>
    <div class="auth-card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
